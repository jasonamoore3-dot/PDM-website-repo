
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - PDM Mobile Detailing</title>
<link rel="stylesheet" href="style.css">
<style>
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
  }
  .gallery-item {
    cursor: pointer;
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid var(--blue);
    aspect-ratio: 1 / 1;
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.2s;
  }
  .gallery-item img:hover {
    transform: scale(1.05);
  }
  .lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(3, 11, 42, 0.95);
    align-items: center;
    justify-content: center;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 8px;
    border: 2px solid var(--blue);
  }
  .close-btn, .nav-btn {
    position: absolute;
    color: white;
    font-size: 35px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    background: rgba(11, 22, 61, 0.7);
    padding: 5px 15px;
    border-radius: 5px;
  }
  .close-btn { top: 20px; right: 20px; }
  .prev-btn { left: 20px; }
  .next-btn { right: 20px; }
</style>
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--navy); border-bottom: 2px solid var(--blue); flex-wrap: wrap; gap: 15px;">
  <a href="index.html" style="display: flex; align-items: center;"><img src="logo.jpeg" class="logo" alt="PDM Logo" style="height: 60px;"></a>
  <nav style="display: flex; gap: 20px; align-items: center;">
    <a href="index.html" style="font-weight: bold; font-size: 15px;">Home</a>
    <a href="services.html" style="font-weight: bold; font-size: 15px;">Services</a>
    <a href="pricing.html" style="font-weight: bold; font-size: 15px;">Pricing</a>
    <a href="gallery.html" style="font-weight: bold; font-size: 15px;">Gallery</a>
    <a class="btn" href="contact.html" style="padding: 8px 15px; background: var(--blue); border-radius: 6px;">Book Now</a>
  </nav>
</header>

<div class="section">
  <h2>Our Work Gallery</h2>
  <p>Tap any image to zoom and scroll through our latest detailing jobs.</p>
  <div class="gallery-grid" id="photoGrid"></div>
</div>

<div id="lightboxWindow" class="lightbox">
  <span class="close-btn" onclick="closeLightbox()">&times;</span>
  <span class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</span>
  <img id="lightboxImg" src="" alt="Popup View">
  <span class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</span>
</div>

<script>
  // This number handles all 20 of your uploaded images
  const TOTAL_IMAGES = 20; 

  const images = ["logo.jpeg"];
  
  // This line is now perfectly customized to look for your ".jpg.jpeg" file extension!
  for (let i = 1; i <= TOTAL_IMAGES; i++) {
    images.push(i + ".jpg.jpeg");
  }

  const grid = document.getElementById("photoGrid");
  images.forEach((imgSrc, index) => {
    const item = document.createElement("div");
    item.className = "gallery-item";
    item.innerHTML = `<img src="${imgSrc}" onclick="openLightbox(${index})" alt="Detailing Work">`;
    grid.appendChild(item);
  });

  let currentImgIndex = 0;

  function openLightbox(index) {
    currentImgIndex = index;
    document.getElementById("lightboxImg").src = images[currentImgIndex];
    document.getElementById("lightboxWindow").style.display = "flex";
  }

  function closeLightbox() {
    document.getElementById("lightboxWindow").style.display = "none";
  }

  function changeImage(direction) {
    currentImgIndex += direction;
    if (currentImgIndex >= images.length) currentImgIndex = 0;
    if (currentImgIndex < 0) currentImgIndex = images.length - 1;
    document.getElementById("lightboxImg").src = images[currentImgIndex];
  }

  document.getElementById("lightboxWindow").addEventListener("click", function(e) {
    if (e.target === this) closeLightbox();
  });
</script>

</body>
</html>
